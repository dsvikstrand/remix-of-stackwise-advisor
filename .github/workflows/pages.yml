name: Deploy Frontend Release

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Commit SHA on main to publish to GitHub Pages"
        required: true
        type: string
      pwa_runtime_v1:
        description: "Enable Bleup's default PWA runtime behavior during this frontend publish"
        required: true
        default: true
        type: boolean
      pwa_install_cta_v1:
        description: "Enable Bleup's default mobile install CTA surfaces during this frontend publish"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate required frontend env
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ]; then
            echo "::error::Missing secret VITE_SUPABASE_URL"
            exit 1
          fi
          if [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "::error::Missing secret VITE_SUPABASE_PUBLISHABLE_KEY"
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_AGENTIC_BACKEND_URL: https://api.bleup.app
          VITE_RELEASE_SHA: ${{ inputs.release_sha }}
          VITE_FEATURE_PWA_RUNTIME_V1: ${{ inputs.pwa_runtime_v1 }}
          VITE_FEATURE_PWA_INSTALL_CTA_V1: ${{ inputs.pwa_install_cta_v1 }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Write release metadata
        run: npm run release:metadata -- --out-dir dist --release-sha "${{ inputs.release_sha }}" --backend-url https://api.bleup.app

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
