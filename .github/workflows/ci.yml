name: CI Gate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Release Build
        run: npm run build:release

      - name: Verify Release Artifact
        run: npm run verify:release-artifact

      - name: Docs Refresh Check
        run: npm run docs:refresh-check -- --json

      - name: Docs Link Check
        run: npm run docs:link-check
